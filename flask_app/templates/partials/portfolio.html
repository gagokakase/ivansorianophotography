<!-- Portfolio Section -->
<section id="portfolio" class="py-28 px-6 md:px-12" style="background-color: var(--isp-bg-section);">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="reveal flex flex-col md:flex-row md:items-end justify-between mb-14 gap-8">
      <div>
        <div class="flex items-center gap-4 mb-4">
          <div style="width: 32px; height: 1px; background-color: var(--isp-gold);"></div>
          <span class="uppercase" style="font-family: var(--font-body); color: var(--isp-gold); letter-spacing: 0.3em; font-size: 14px;">Portfolio</span>
        </div>
        <h2 class="text-5xl md:text-6xl"
          style="font-family: var(--font-display); color: var(--isp-cream); font-weight: 300; line-height: 1.1;">
          The Work
        </h2>
      </div>

      <!-- Filter tabs -->
      <div class="flex gap-1" id="portfolio-filters">
        <button onclick="filterPortfolio('Wedding', this)"
          class="portfolio-filter border px-5 py-2 uppercase tracking-wider transition-all duration-300 hover:border-isp-gold hover:text-isp-cream active"
          style="font-family: var(--font-body); letter-spacing: 0.15em; font-size: 13px; color: var(--isp-bg); background-color: var(--isp-gold); border-color: var(--isp-gold);">Wedding</button>
        <button onclick="filterPortfolio('Portrait', this)"
          class="portfolio-filter border px-5 py-2 uppercase tracking-wider transition-all duration-300 hover:border-isp-gold hover:text-isp-cream"
          style="font-family: var(--font-body); letter-spacing: 0.15em; font-size: 13px; color: var(--isp-text-muted); background-color: transparent; border-color: rgba(122,140,126,0.3);">Portrait</button>
      </div>
    </div>

    <!-- Album mosaic grid -->
    <div class="album-collage" id="portfolio-grid">
      <!-- Mark (left, tall) -->
      <div class="album-tile album-featured portfolio-item reveal-scale"
        data-category="Wedding" data-src="{{ url_for('static', filename='img/wedding-bride-portrait.jpg') }}" data-alt="Mark" data-title="Mark" data-location="Bridal Portrait">
        <img src="{{ url_for('static', filename='img/wedding-bride-portrait.jpg') }}" alt="Mark" />
        <div class="portfolio-overlay absolute inset-0 flex items-end p-6"
          style="background: linear-gradient(to top, rgba(8,12,9,0.85) 0%, transparent 60%);">
          <p style="font-family: var(--font-display); color: var(--isp-cream); font-size: 26px; font-weight: 400;">Mark</p>
        </div>
      </div>

      <!-- Dianne (right, tall) -->
      <div class="album-tile album-dianne portfolio-item reveal-scale delay-1"
        data-category="Wedding" data-src="{{ url_for('static', filename='img/wedding-altar.jpg') }}" data-alt="Dianne" data-title="Dianne" data-location="Ceremony">
        <img src="{{ url_for('static', filename='img/wedding-altar.jpg') }}" alt="Dianne" />
        <div class="portfolio-overlay absolute inset-0 flex items-end p-6"
          style="background: linear-gradient(to top, rgba(8,12,9,0.85) 0%, transparent 60%);">
          <p style="font-family: var(--font-display); color: var(--isp-cream); font-size: 26px; font-weight: 400;">Dianne</p>
        </div>
      </div>

      <!-- Groom getting ready -->
      <div class="album-tile album-a portfolio-item reveal-scale delay-2"
        data-category="Wedding" data-src="{{ url_for('static', filename='img/wedding-groom.jpg') }}" data-alt="Groom getting ready" data-title="Mark" data-location="Getting Ready">
        <img src="{{ url_for('static', filename='img/wedding-groom.jpg') }}" alt="Groom getting ready" />
      </div>

      <!-- Wedding rings (between groom and bride) -->
      <div class="album-tile album-rings portfolio-item reveal-scale delay-2"
        data-category="Wedding" data-src="{{ url_for('static', filename='img/wedding-rings.jpg') }}" data-alt="Wedding rings" data-title="Mark &amp; Dianne" data-location="Rings">
        <img src="{{ url_for('static', filename='img/wedding-rings.jpg') }}" alt="Wedding rings" />
      </div>

      <!-- Bride getting ready -->
      <div class="album-tile album-b portfolio-item reveal-scale delay-3"
        data-category="Wedding" data-src="{{ url_for('static', filename='img/wedding-bride.jpg') }}" data-alt="Bride getting ready" data-title="Dianne" data-location="Getting Ready">
        <img src="{{ url_for('static', filename='img/wedding-bride.jpg') }}" alt="Bride getting ready" />
      </div>

      <!-- Portrait (only shows on Portrait filter) -->
      <div class="album-tile album-portrait portfolio-item reveal-scale delay-3"
        data-category="Portrait" data-src="{{ url_for('static', filename='img/image-2.png') }}" data-alt="Portrait session" data-title="Leorah" data-location="Studio">
        <img src="{{ url_for('static', filename='img/image-2.png') }}" alt="Portrait session" />
      </div>
    </div>

    <!-- CTA -->
    <div class="reveal mt-14 flex justify-center">
      <a href="https://www.facebook.com/IvanSorianoPhotography" target="_blank" rel="noopener noreferrer"
        class="border px-10 py-4 uppercase tracking-widest hover:border-isp-gold hover:text-isp-gold transition-all duration-300"
        style="font-family: var(--font-body); color: var(--isp-cream); border-color: rgba(242,237,228,0.2); letter-spacing: 0.2em; font-size: 14px;">
        View Full Gallery on Facebook
      </a>
    </div>
  </div>
</section>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10"
  style="background-color: rgba(8,12,9,0.95); display: none;">
  <div class="lightbox-content relative max-w-4xl w-full max-h-[85vh] flex items-center justify-center" id="lightbox-content">
    <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[80vh] object-contain" />
    <button id="lightbox-close"
      class="absolute top-3 right-3 w-10 h-10 flex items-center justify-center hover:border-isp-gold transition-colors"
      style="background-color: rgba(8,12,9,0.8); border: 1px solid rgba(200,169,110,0.3); color: var(--isp-cream);">
      <i data-lucide="x" style="width: 16px; height: 16px;"></i>
    </button>
    <div class="absolute bottom-3 left-0 right-0 text-center">
      <p id="lightbox-title" style="font-family: var(--font-display); color: var(--isp-cream); font-size: 22px;"></p>
      <p id="lightbox-location" class="uppercase" style="font-family: var(--font-body); color: var(--isp-gold); font-size: 14px; letter-spacing: 0.15em;"></p>
    </div>
  </div>
</div>
