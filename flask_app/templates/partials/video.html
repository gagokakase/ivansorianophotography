<!-- Video Showcase Section -->
<section id="video-showcase" class="py-16 md:py-28 px-4 sm:px-6 md:px-12" style="background-color: var(--isp-bg-section);">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="reveal text-center mb-14">
      <div class="flex items-center justify-center gap-4 mb-4">
        <div style="width: 32px; height: 1px; background-color: var(--isp-gold);"></div>
        <span class="uppercase" style="font-family: var(--font-body); color: var(--isp-gold); letter-spacing: 0.3em; font-size: 14px;">Showreel</span>
        <div style="width: 32px; height: 1px; background-color: var(--isp-gold);"></div>
      </div>
      <h2 class="text-3xl sm:text-5xl md:text-6xl"
        style="font-family: var(--font-display); color: var(--isp-cream); font-weight: 300; line-height: 1.1;">
        Moments in<br />
        <em style="font-style: italic; font-weight: 400;">motion.</em>
      </h2>
    </div>

    <!-- Video player -->
    <div class="reveal max-w-5xl mx-auto">
      <div class="relative overflow-hidden" style="border: 1px solid rgba(200,169,110,0.15);">
        <video id="showcase-video" class="w-full block" style="display: block; aspect-ratio: 16/9; background-color: var(--isp-bg);"
          preload="metadata" playsinline>
          <source src="{{ url_for('static', filename='video/showcase.mp4') }}" type="video/mp4" />
        </video>

        <!-- Custom play overlay -->
        <div id="video-overlay" class="absolute inset-0 flex items-center justify-center cursor-pointer transition-opacity duration-500"
          style="background: linear-gradient(135deg, rgba(8,12,9,0.6) 0%, rgba(8,12,9,0.3) 100%);">
          <div class="flex flex-col items-center gap-4">
            <div class="w-20 h-20 flex items-center justify-center rounded-full transition-all duration-300 hover:scale-110"
              style="background-color: rgba(31,72,48,0.7); border: 2px solid var(--isp-gold); color: var(--isp-gold); backdrop-filter: blur(4px);">
              <i data-lucide="play" style="width: 32px; height: 32px; margin-left: 4px;"></i>
            </div>
            <p class="uppercase" style="font-family: var(--font-body); color: var(--isp-cream); font-size: 14px; letter-spacing: 0.2em;">Watch Showreel</p>
          </div>
        </div>

        <!-- Custom controls bar -->
        <div id="video-controls" class="absolute bottom-0 left-0 right-0 px-4 py-3 flex items-center gap-3 transition-opacity duration-300"
          style="background: linear-gradient(to top, rgba(8,12,9,0.9) 0%, rgba(8,12,9,0.5) 70%, transparent 100%); opacity: 0; pointer-events: none;">
          <!-- Play/Pause -->
          <button id="video-play-btn" class="flex-shrink-0" style="color: var(--isp-cream); background: none; border: none; cursor: pointer;">
            <i data-lucide="pause" id="video-play-icon" style="width: 20px; height: 20px;"></i>
          </button>
          <!-- Time -->
          <span id="video-current" class="flex-shrink-0" style="font-family: var(--font-body); color: var(--isp-cream); font-size: 13px; min-width: 40px; text-align: center;">0:00</span>
          <!-- Progress bar -->
          <div id="video-progress-track" class="flex-1 relative cursor-pointer"
            style="height: 4px; background-color: rgba(242,237,228,0.2); border-radius: 2px;">
            <div id="video-progress-buffered" class="absolute top-0 left-0 h-full"
              style="background-color: rgba(242,237,228,0.15); border-radius: 2px; width: 0%;"></div>
            <div id="video-progress-fill" class="absolute top-0 left-0 h-full"
              style="background-color: var(--isp-gold); border-radius: 2px; width: 0%;"></div>
            <div id="video-progress-thumb" class="absolute top-1/2"
              style="width: 12px; height: 12px; background-color: var(--isp-gold); border-radius: 50%; transform: translate(-50%, -50%); left: 0%; opacity: 0; transition: opacity 0.2s;"></div>
          </div>
          <!-- Duration -->
          <span id="video-duration" class="flex-shrink-0" style="font-family: var(--font-body); color: var(--isp-cream); font-size: 13px; min-width: 40px; text-align: center;">0:00</span>
          <!-- Volume slider -->
          <input type="range" id="video-volume-slider" min="0" max="1" step="0.05" value="1"
            class="flex-shrink-0 cursor-pointer"
            style="width: 80px; accent-color: var(--isp-gold); height: 4px;" />
          <!-- Mute -->
          <button id="video-mute-btn" class="flex-shrink-0" style="color: var(--isp-cream); background: none; border: none; cursor: pointer;">
            <i data-lucide="volume-2" id="video-mute-icon" style="width: 20px; height: 20px;"></i>
          </button>
          <!-- Fullscreen -->
          <button id="video-fs-btn" class="flex-shrink-0" style="color: var(--isp-cream); background: none; border: none; cursor: pointer;">
            <i data-lucide="maximize" style="width: 20px; height: 20px;"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
