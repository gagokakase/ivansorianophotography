<!-- Hero Section -->
<section id="home" class="relative w-full h-screen min-h-[600px] flex items-center justify-center overflow-hidden">
  <!-- Background image -->
  <div class="absolute inset-0">
    <img src="{{ url_for('static', filename='img/image-1.png') }}"
      alt="Ivan Soriano Photography — Wedding at San Agustin Church"
      class="w-full h-full object-cover object-center"
      style="transform: scale(1.05);" />
    <!-- Multi-layer gradient overlay -->
    <div class="absolute inset-0"
      style="background: linear-gradient(to bottom, rgba(8,12,9,0.55) 0%, rgba(8,12,9,0.2) 40%, rgba(8,12,9,0.75) 100%);"></div>
    <div class="absolute inset-0"
      style="background: linear-gradient(to right, rgba(8,12,9,0.5) 0%, transparent 60%);"></div>
  </div>

  <!-- Grain texture overlay -->
  <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
    style="background-image: url(&quot;data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E&quot;); background-repeat: repeat; background-size: 128px;"></div>

  <!-- Content -->
  <div class="relative z-10 max-w-7xl mx-auto px-6 md:px-12 w-full flex flex-col justify-end pb-28 h-full">
    <!-- Gold accent line -->
    <div class="hero-accent-line mb-6" style="background-color: var(--isp-gold); height: 1px;"></div>

    <p class="hero-eyebrow text-sm uppercase tracking-widest mb-4"
      style="font-family: var(--font-body); color: var(--isp-gold); letter-spacing: 0.3em;">
      Cavite, Philippines
    </p>

    <h1 class="hero-title text-6xl md:text-8xl lg:text-9xl mb-4 max-w-4xl"
      style="font-family: var(--font-display); color: var(--isp-cream); line-height: 1.05; font-weight: 300;">
      Moments<br />
      <em style="font-style: italic; font-weight: 400;">that matters.</em>
    </h1>

    <p class="hero-subtitle text-base md:text-lg mb-10 max-w-md"
      style="font-family: var(--font-body); color: rgba(242,237,228,0.85); letter-spacing: 0.05em;">
      Wedding · Debut · Events · Portrait Photography
    </p>

    <div class="hero-cta flex flex-col sm:flex-row gap-4">
      <button onclick="smoothScroll('#portfolio')"
        class="text-sm uppercase tracking-widest px-8 py-4 hover:bg-isp-green-light transition-all duration-300"
        style="background-color: var(--isp-green); color: var(--isp-cream); font-family: var(--font-body); letter-spacing: 0.2em; border: 1px solid var(--isp-green-light);">
        View Portfolio
      </button>
      <button onclick="smoothScroll('#contact')"
        class="text-sm uppercase tracking-widest px-8 py-4 hover:border-isp-gold hover:text-isp-gold transition-all duration-300"
        style="color: var(--isp-cream); font-family: var(--font-body); letter-spacing: 0.2em; border: 1px solid rgba(242,237,228,0.3);">
        Book a Session
      </button>
    </div>
  </div>

  <!-- Scroll indicator -->
  <button onclick="smoothScroll('#services')"
    class="hero-scroll-indicator absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-50 hover:opacity-100 transition-opacity"
    style="color: var(--isp-cream);">
    <span class="uppercase tracking-widest"
      style="font-family: var(--font-body); letter-spacing: 0.2em; font-size: 12px;">Scroll</span>
    <div class="scroll-bounce">
      <i data-lucide="chevron-down" style="width: 16px; height: 16px;"></i>
    </div>
  </button>
</section>
