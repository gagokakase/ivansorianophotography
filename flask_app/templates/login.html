<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Ivan Soriano Photography</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'isp-green': '#1F4830',
            'isp-cream': '#F2EDE4',
            'isp-gold': '#C8A96E',
            'isp-bg': '#080C09',
            'isp-bg-card': '#111714',
            'isp-bg-section': '#0D120F',
            'isp-text-muted': '#7A8C7E',
          },
          fontFamily: {
            'display': ['Cormorant Garamond', 'Georgia', 'serif'],
            'body': ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <style>
    .login-bg {
      background-image: linear-gradient(rgba(8,12,9,0.85), rgba(8,12,9,0.95)), url('{{ url_for('static', filename='img/image-1.png') }}');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .login-card {
      background-color: rgba(17, 23, 20, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(200, 169, 110, 0.15);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }
    .login-input {
      background-color: rgba(31, 72, 48, 0.12);
      border: 1px solid rgba(31, 72, 48, 0.35);
      color: var(--isp-cream);
      font-size: 15px;
      transition: border-color 0.3s ease, background-color 0.3s ease;
    }
    .login-input:focus {
      border-color: var(--isp-gold);
      background-color: rgba(31, 72, 48, 0.2);
    }
    .login-input::placeholder {
      color: rgba(157, 173, 159, 0.5);
    }
    .login-btn {
      background: linear-gradient(135deg, var(--isp-gold), #B8945A);
      color: var(--isp-bg);
      font-weight: 500;
      letter-spacing: 0.15em;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(200, 169, 110, 0.3);
    }
    .login-flash {
      background-color: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #f87171;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-animate {
      animation: fadeInUp 0.6s ease-out;
    }
  </style>
</head>
<body style="background-color: var(--isp-bg); font-family: var(--font-body); min-height: 100vh;">

  <!-- Full screen background -->
  <div class="login-bg fixed inset-0"></div>

  <!-- Content -->
  <div class="relative min-h-screen flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md login-animate">

      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="/" class="inline-flex items-center gap-3">
          <svg width="44" height="44" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 10 H50 Q50 50 10 50 Z" fill="white" />
            <path d="M50 10 H90 V50 Q50 50 50 10 Z" fill="#1F4830" />
            <path d="M10 50 Q50 50 50 90 H10 Z" fill="#1F4830" />
            <path d="M50 50 Q50 90 90 90 V50 Z" fill="white" />
          </svg>
          <div class="flex flex-col leading-none text-left">
            <span class="text-base font-medium tracking-widest uppercase"
              style="font-family: var(--font-display); letter-spacing: 0.12em; color: var(--isp-cream);">
              Ivan Soriano
            </span>
            <span class="text-sm tracking-widest uppercase"
              style="font-family: var(--font-display); letter-spacing: 0.2em; color: var(--isp-text-muted);">
              Photography
            </span>
          </div>
        </a>
      </div>

      <!-- Login card -->
      <div class="login-card p-8 md:p-10">
        <div class="text-center mb-8">
          <div class="flex items-center justify-center gap-4 mb-3">
            <div style="width: 28px; height: 1px; background-color: var(--isp-gold);"></div>
            <span class="uppercase" style="font-family: var(--font-body); color: var(--isp-gold); letter-spacing: 0.3em; font-size: 12px;">Welcome</span>
            <div style="width: 28px; height: 1px; background-color: var(--isp-gold);"></div>
          </div>
          <h1 style="font-family: var(--font-display); color: var(--isp-cream); font-size: 36px; font-weight: 300;">Sign In</h1>
          <p style="color: var(--isp-text-muted); font-size: 14px; margin-top: 4px;">Access your photo gallery</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="login-flash mb-4 px-4 py-3 text-sm">
                <i class="bi bi-exclamation-circle" style="font-size: 14px;"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="mb-5">
            <label class="block mb-2 uppercase" style="font-size: 11px; letter-spacing: 0.2em; color: var(--isp-text-muted);">Email</label>
            <div class="relative">
              <i class="bi bi-envelope absolute left-4 top-1/2 -translate-y-1/2" style="font-size: 15px; color: var(--isp-text-muted);"></i>
              <input type="email" name="email" required autofocus
                class="login-input w-full pl-11 pr-4 py-3.5 outline-none"
                placeholder="your@email.com" />
            </div>
          </div>
          <div class="mb-6">
            <label class="block mb-2 uppercase" style="font-size: 11px; letter-spacing: 0.2em; color: var(--isp-text-muted);">Password</label>
            <div class="relative">
              <i class="bi bi-lock absolute left-4 top-1/2 -translate-y-1/2" style="font-size: 15px; color: var(--isp-text-muted);"></i>
              <input type="password" name="password" required id="password-field"
                class="login-input w-full pl-11 pr-11 py-3.5 outline-none"
                placeholder="Enter your password" />
              <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2" style="color: var(--isp-text-muted);">
                <i class="bi bi-eye" id="eye-icon" style="font-size: 15px;"></i>
              </button>
            </div>
          </div>
          <button type="submit"
            class="login-btn w-full py-3.5 uppercase text-sm">
            Sign In
          </button>
        </form>

        <div class="text-center mt-6 pt-6" style="border-top: 1px solid rgba(31,72,48,0.3);">
          <p style="color: var(--isp-text-muted); font-size: 14px;">
            Don't have an account?
            <a href="/register" style="color: var(--isp-gold); text-decoration: none; font-weight: 500;">Register here</a>
          </p>
        </div>
      </div>

      <p class="text-center mt-6">
        <a href="/" style="color: var(--isp-text-muted); font-size: 14px; text-decoration: none;">
          <i class="bi bi-arrow-left" style="font-size: 12px;"></i> Back to home
        </a>
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      var field = document.getElementById('password-field');
      var icon = document.getElementById('eye-icon');
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      }
    }
  </script>
</body>
</html>
